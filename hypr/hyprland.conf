debug {
    suppress_errors = true
}

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = AQ_DRM_DEVICES,/dev/dri/intel-igpu

################
### MONITORS ###
################

monitor=eDP-1,1920x1200@60,auto,1
monitor=, preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = thunar
$menu = tofi-drun --drun-launch=true
$browser = zen-browser


#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper
exec-once = udiskie
exec-once = clipse -listen
exec-once = waybar
exec-once = nm-applet

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 1
    gaps_out = 0

    border_size = 0

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false

    bezier = easeOutQuint, 0.755, 0.05, 0.855, 0.06
    bezier = easeInQuint, 0.755, 0.05, 0.855, 0.06
    bezier = easeInOutQuint, 0.86, 0, 0.07, 1

    animation = windowsIn, 1, 2, easeInOutQuint, slide
    animation = windowsOut, 1, 1, easeInOutQuint, popin
    animation = windowsMove, 1, 2, easeInOutQuint
    animation = fade, 1, 1, easeInQuint
    animation = workspaces, 1, 1, easeInOutQuint, slide
    animation = specialWorkspace, 1, 1, easeInOutQuint, slidevertfade
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# debug:disable_logs = false

misc {
    vfr = true
    force_default_wallpaper = 0  # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe_forever = true
    gesture = 3, horizontal, workspace, 
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

# App shortcuts
bind = $mainMod, R, exec, $menu
bind = $mainMod, Q, killactive
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, S, exec, grimblast copy area
bind = $mainMod SHIFT, V, exec, $terminal -e 'clipse' 
bind = CTRL SHIFT, Escape, exec, $terminal -e 'btop'

# Toggle floating mode
bind = $mainMod, V, togglefloating

# Move windows with left click
bindm = $mainMod, mouse:272, movewindow

# Resize windows with arrows
bind = $mainMod, left, resizeactive, -20 0
bind = $mainMod, right, resizeactive, 20 0
bind = $mainMod, up, resizeactive, 0 -20
bind = $mainMod, down, resizeactive, 0 20

# Switch workspaces with azerty top row
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute,    workspace, 2
bind = $mainMod, quotedbl,  workspace, 3
bind = $mainMod, apostrophe,workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus,     workspace, 6
bind = $mainMod, egrave,    workspace, 7
bind = $mainMod, underscore,workspace, 8
bind = $mainMod, ccedilla,  workspace, 9
bind = $mainMod, agrave, togglespecialworkspace
bind = $mainMod, Tab, workspace, e-1
bind = ALT, Tab, workspace, e+1

# Move window to workspaces with top row and shift
bind = $mainMod SHIFT, ampersand, movetoworkspacesilent, 1
bind = $mainMod SHIFT, eacute,    movetoworkspacesilent, 2
bind = $mainMod SHIFT, quotedbl,  movetoworkspacesilent, 3
bind = $mainMod SHIFT, apostrophe,movetoworkspacesilent, 4
bind = $mainMod SHIFT, parenleft, movetoworkspacesilent, 5
bind = $mainMod SHIFT, minus,     movetoworkspacesilent, 6
bind = $mainMod SHIFT, egrave,    movetoworkspacesilent, 7
bind = $mainMod SHIFT, underscore,movetoworkspacesilent, 8
bind = $mainMod SHIFT, ccedilla,  movetoworkspacesilent, 9
bind = $mainMod SHIFT, agrave,    movetoworkspacesilent, special

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
